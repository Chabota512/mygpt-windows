name: Build Windows Desktop App

on:
  push:
    branches: [main]
    paths:
      - "desktop/**"
      - "python-backend/**"
      - "artifacts/student-ai/**"
      - ".github/workflows/desktop-windows.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # ─── Toolchains ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      # ─── Frontend (React/Vite) ─────────────────────────────────────
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite)
        env:
          BASE_PATH: "./"
          PORT: "5173"
          NODE_ENV: "production"
        run: pnpm --filter @workspace/student-ai run build

      # ─── Python backend → mygpt-backend.exe via PyInstaller ────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python-backend/requirements.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        working-directory: desktop
        run: pyinstaller --noconfirm --clean --distpath ./src-tauri/binaries --workpath ./build/pyinstaller mygpt-backend.spec

      - name: Rename sidecar with Tauri target triple
        shell: pwsh
        working-directory: desktop/src-tauri/binaries
        run: |
          if (Test-Path mygpt-backend.exe) {
            Rename-Item mygpt-backend.exe mygpt-backend-x86_64-pc-windows-msvc.exe
          }

      # ─── Tauri CLI + build ─────────────────────────────────────────
      - name: Install desktop deps
        working-directory: desktop
        run: pnpm install --no-frozen-lockfile

      - name: Generate placeholder icons (if missing)
        shell: pwsh
        working-directory: desktop
        run: |
          $icons = "src-tauri/icons/icon.ico", "src-tauri/icons/32x32.png", "src-tauri/icons/128x128.png"
          $missing = $false
          foreach ($i in $icons) { if (!(Test-Path $i)) { $missing = $true } }
          if ($missing) {
            # Create a 1024x1024 solid-color placeholder, then let tauri-cli fan it out.
            Add-Type -AssemblyName System.Drawing
            $bmp = New-Object System.Drawing.Bitmap 1024,1024
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.Clear([System.Drawing.Color]::FromArgb(99,102,241))
            $bmp.Save("src-tauri/icons/source.png", [System.Drawing.Imaging.ImageFormat]::Png)
            $g.Dispose(); $bmp.Dispose()
            pnpm tauri icon src-tauri/icons/source.png
          }

      - name: Build Tauri installer
        working-directory: desktop
        run: pnpm tauri build

      # ─── Upload artifacts ──────────────────────────────────────────
      - name: Upload installer (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: MyGPT-Windows-Installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload installer (MSI)
        uses: actions/upload-artifact@v4
        with:
          name: MyGPT-Windows-MSI
          path: desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: MyGPT-Portable
          path: desktop/src-tauri/target/release/*.exe
          if-no-files-found: warn
